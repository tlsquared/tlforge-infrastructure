[tools]
opentofu = "1.11"

[env]
SCW_ACCESS_KEY = { required = true, redact = true }
SCW_SECRET_KEY = { required = true, redact = true }
SCW_DEFAULT_PROJECT_ID = { required = true, redact = true }
SCW_DEFAULT_ORGANIZATION_ID = { required = true, redact = true }
SCW_DEFAULT_REGION = "fr-par"
SCW_DEFAULT_ZONE = "fr-par-1"

[tasks.init]
run = "tofu init -reconfigure"
env = {
    AWS_ACCESS_KEY_ID = "{{ env.SCW_ACCESS_KEY }}",
    AWS_SECRET_ACCESS_KEY = "{{ env.SCW_SECRET_KEY }}",
    TF_VAR_scaleway_project_id = "{{ env.SCW_DEFAULT_PROJECT_ID }}"
}

[tasks.plan]
run = "tofu plan"
env = {
    AWS_ACCESS_KEY_ID = "{{ env.SCW_ACCESS_KEY }}",
    AWS_SECRET_ACCESS_KEY = "{{ env.SCW_SECRET_KEY }}",
    TF_VAR_scaleway_project_id = "{{ env.SCW_DEFAULT_PROJECT_ID }}"
}

[tasks.apply]
run = "tofu apply"
env = {
    AWS_ACCESS_KEY_ID = "{{ env.SCW_ACCESS_KEY }}",
    AWS_SECRET_ACCESS_KEY = "{{ env.SCW_SECRET_KEY }}",
    TF_VAR_scaleway_project_id = "{{ env.SCW_DEFAULT_PROJECT_ID }}"
}
